openapi: 3.0.3
info:
  title: TaskEngine API
  description: |
    Backend API for TaskEngine — Moodle-integrated student productivity app.

    ## Authentication
    Most endpoints require a **Bearer JWT token** in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Get a token by calling `POST /api/auth/register` or `POST /api/auth/login`.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development server

tags:
  - name: Auth
    description: Register and login
  - name: User
    description: Profile and settings
  - name: Assignments
    description: Create, list, update, delete assignments
  - name: Moodle
    description: Sync Moodle ICS calendar
  - name: Dashboard
    description: Workload summary
  - name: Calendar
    description: Monthly assignment view
  - name: Study Sessions
    description: Log and view study sessions
  - name: Modules
    description: List courses/modules
  - name: Health
    description: Server health check

# ─── SECURITY SCHEME ──────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── REUSABLE SCHEMAS ────────────────────────────────────────────────────────
  schemas:

    # Auth
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: John Doe
          description: Full name (required, non-empty)
        email:
          type: string
          format: email
          example: john@example.com
          description: Valid email address
        password:
          type: string
          minLength: 6
          example: secret123
          description: Minimum 6 characters

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: secret123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token (expires in 7 days)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: John Doe
            email:
              type: string
              example: john@example.com

    # User
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        moodleConnected:
          type: boolean
          description: true if ICS URL is saved
        lastSync:
          type: string
          format: date-time
          nullable: true
        notificationsEnabled:
          type: boolean
        notificationLeadTime:
          type: integer
          description: Minutes before deadline to notify
        darkModeEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UpdateSettingsRequest:
      type: object
      description: All fields are optional — only send what you want to change
      properties:
        notificationsEnabled:
          type: boolean
          example: true
        notificationLeadTime:
          type: integer
          example: 60
          description: Minutes before deadline to send notification
        darkModeEnabled:
          type: boolean
          example: false

    # Assignments
    Assignment:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        courseId:
          type: integer
        courseName:
          type: string
        dueDate:
          type: string
          format: date-time
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          description: 1 = easy, 5 = very hard
        priority:
          type: number
          description: Calculated automatically from difficulty + dueDate
        weight:
          type: integer
        source:
          type: string
          enum: [manual, ics]
        icsUid:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateAssignmentRequest:
      type: object
      required: [title, courseId, dueDate]
      properties:
        title:
          type: string
          example: "Lab Report 3"
          description: Required, non-empty
        courseId:
          type: integer
          example: 2
          description: Must belong to the authenticated user
        dueDate:
          type: string
          format: date-time
          example: "2026-04-15T23:59:00.000Z"
          description: ISO 8601 datetime
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
          example: 4
          description: Optional, defaults to 3

    UpdateAssignmentRequest:
      type: object
      description: All fields optional
      properties:
        title:
          type: string
          example: "Lab Report 3 (revised)"
        dueDate:
          type: string
          format: date-time
          example: "2026-04-20T23:59:00.000Z"
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          example: 2

    # Moodle
    SyncRequest:
      type: object
      required: [icsUrl]
      properties:
        icsUrl:
          type: string
          example: "https://moodle.youruni.ac.uk/calendar/export_execute.php?..."
          description: |
            Must be:
            - A valid HTTPS URL
            - Not pointing to localhost or private/internal IPs (10.x, 192.168.x, 172.16-31.x)

    SyncResponse:
      type: object
      properties:
        message:
          type: string
          example: "Sync complete"
        created:
          type: integer
          description: Number of new assignments created
        updated:
          type: integer
          description: Number of existing assignments updated
        total:
          type: integer
          description: Total ICS events processed

    MoodleStatus:
      type: object
      properties:
        connected:
          type: boolean
        lastSync:
          type: string
          format: date-time
          nullable: true

    # Dashboard
    DashboardSummary:
      type: object
      properties:
        workloadStatus:
          type: string
          enum: [light, moderate, heavy]
          description: |
            light   = score < 25
            moderate = score 25–59
            heavy    = score >= 60
        workloadScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Calculated from urgent assignments × difficulty
        totalAssignments:
          type: integer
        dueThisWeek:
          type: integer
        urgentCount:
          type: integer
          description: Assignments due within 3 days
        hardestDifficulty:
          type: integer
          minimum: 0
          maximum: 5
        totalStudyMinutes:
          type: integer
          description: Study minutes logged this week
        nextDeadline:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Assignment'

    # Calendar
    CalendarResponse:
      type: object
      description: Keys are dates in "YYYY-MM-DD" format, values are arrays of assignments
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/Assignment'
      example:
        "2026-04-10":
          - id: 5
            title: "Essay Draft"
            courseName: "English Lit"
            dueDate: "2026-04-10T23:59:00.000Z"
            difficulty: 3
            priority: 72.5

    # Study Sessions
    CreateSessionRequest:
      type: object
      required: [courseId, duration]
      properties:
        courseId:
          type: integer
          example: 1
          description: Must belong to the authenticated user
        duration:
          type: integer
          minimum: 1
          example: 90
          description: Duration in minutes (must be >= 1)
        date:
          type: string
          format: date-time
          example: "2026-03-26T14:00:00.000Z"
          description: Optional. Defaults to current time if not provided

    StudySession:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        courseName:
          type: string
        duration:
          type: integer
          description: Minutes
        date:
          type: string
          format: date-time
        userId:
          type: integer

    WeeklyStats:
      type: object
      properties:
        weekStart:
          type: string
          format: date-time
        weekEnd:
          type: string
          format: date-time
        totalMinutes:
          type: integer
        modules:
          type: array
          items:
            type: object
            properties:
              courseName:
                type: string
              courseId:
                type: integer
              totalMinutes:
                type: integer
              sessionCount:
                type: integer

    # Modules
    Module:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        assignmentCount:
          type: integer
        sessionCount:
          type: integer

    # Errors
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Some error message"

    ValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

# ─── PATHS ────────────────────────────────────────────────────────────────────
paths:

  # ── HEALTH ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Server health check
      description: Returns 200 if the server is running
      responses:
        '200':
          description: Server is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Email already registered"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid email or password"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password using email + current password
      description: |
        Does **not** require a JWT token.
        Verifies email and current password, then updates to the new password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, currentPassword, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                currentPassword:
                  type: string
                  example: oldSecret123
                newPassword:
                  type: string
                  minLength: 6
                  example: newSecret456
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '401':
          description: Invalid email or current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid email or password"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  # ── USER ─────────────────────────────────────────────────────────────────────
  /user/profile:
    get:
      tags: [User]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/settings:
    put:
      tags: [User]
      summary: Update user settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: Updated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── ASSIGNMENTS ──────────────────────────────────────────────────────────────
  /assignments:
    get:
      tags: [Assignments]
      summary: List upcoming assignments
      description: Returns all assignments with `dueDate >= now`, sorted by due date ascending
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Assignments]
      summary: Create a new assignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '404':
          description: Course not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /assignments/{id}:
    put:
      tags: [Assignments]
      summary: Update an assignment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssignmentRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '404':
          description: Assignment not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Assignments]
      summary: Delete an assignment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Assignment deleted"
        '404':
          description: Assignment not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── MOODLE ───────────────────────────────────────────────────────────────────
  /moodle/sync:
    post:
      tags: [Moodle]
      summary: Connect Moodle and sync ICS calendar
      description: |
        Saves the ICS URL (encrypted) and imports all assignments from Moodle.

        **Rate limit:** 5 requests per 15 minutes per user.

        **URL rules:**
        - Must be `https://`
        - Must NOT be localhost, 127.0.0.1, or any private IP (10.x, 192.168.x, 172.16–31.x)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequest'
      responses:
        '200':
          description: Sync complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'
        '400':
          description: Invalid or missing icsUrl
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing:
                  value: { error: "icsUrl is required" }
                invalidUrl:
                  value: { error: "Invalid URL format" }
                notHttps:
                  value: { error: "Only HTTPS URLs are allowed" }
                internal:
                  value: { error: "Internal/private URLs are not allowed" }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Too many sync requests, please try again later"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /moodle/resync:
    post:
      tags: [Moodle]
      summary: Re-sync using saved ICS URL
      description: |
        Uses the previously saved (encrypted) ICS URL to re-import assignments.

        **Rate limit:** 5 requests per 15 minutes per user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Re-sync complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'
        '400':
          description: No Moodle URL configured yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "No Moodle URL configured"
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /moodle/status:
    get:
      tags: [Moodle]
      summary: Check Moodle connection status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Moodle connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoodleStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /moodle/disconnect:
    post:
      tags: [Moodle]
      summary: Disconnect Moodle (removes saved ICS URL)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Moodle disconnected"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get workload summary for the current week
      description: |
        Returns:
        - Workload status (`light` / `moderate` / `heavy`)
        - Upcoming assignment counts
        - Urgent assignments (due within 3 days)
        - Study minutes logged this week
        - Next deadline assignment
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── CALENDAR ─────────────────────────────────────────────────────────────────
  /calendar/{year}/{month}:
    get:
      tags: [Calendar]
      summary: Get assignments grouped by day for a given month
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
          example: 2026
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 4
      responses:
        '200':
          description: Assignments grouped by date key (YYYY-MM-DD)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'
        '400':
          description: Invalid year or month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid year or month"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── STUDY SESSIONS ───────────────────────────────────────────────────────────
  /study-sessions:
    post:
      tags: [Study Sessions]
      summary: Log a study session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Study session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySession'
        '404':
          description: Course not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /study-sessions/weekly:
    get:
      tags: [Study Sessions]
      summary: Get study stats for the current week
      description: Returns total minutes and breakdown per module for Mon–Sun week
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Weekly study stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── MODULES ──────────────────────────────────────────────────────────────────
  /modules:
    get:
      tags: [Modules]
      summary: List all modules (courses) for the current user
      description: Returns courses sorted alphabetically with assignment and session counts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Module'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

